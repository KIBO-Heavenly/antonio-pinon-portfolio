name: Build and Deploy to GitHub Pages

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm ci

      - name: Check Web3Forms secret
        run: |
          if [ -z "${{ secrets.VITE_WEB3FORMS_KEY }}" ]; then
            echo "::error::VITE_WEB3FORMS_KEY is not set. Add it in Settings → Secrets and variables → Actions."
            exit 1
          fi
          echo "Web3Forms key is set (value not shown)."

      - name: Build (production)
        run: npm run build
        env:
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
